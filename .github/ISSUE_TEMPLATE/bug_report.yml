name: Bug Report
description: Report a bug or unexpected behaviour in the PCF Syntax Highlighter control
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open a model-driven app form with the control
        2. Set language to '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where is the control deployed?
      options:
        - Power Apps (Model-Driven)
        - Power Apps (Canvas)
        - Power Pages
        - PCF Test Harness (local dev)
        - Other
    validations:
      required: true

  - type: input
    id: language
    attributes:
      label: Language Setting
      description: Which language was configured on the control?
      placeholder: e.g. typescript

  - type: input
    id: theme
    attributes:
      label: Theme Setting
      description: Which theme was configured on the control?
      placeholder: e.g. github-dark

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Console Errors
      description: Paste any browser console errors or attach screenshots here.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
